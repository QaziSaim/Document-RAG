<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Movie RAG</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #ff0000;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: #cc0000;
        }

        .response-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #f0f0f0;
            border-radius: 8px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Pokemon Movie RAG Chatbot</h1>

        <form method="POST">

            <textarea name="query" placeholder="Ask anything about Pokemon...">{{ query if query else '' }}</textarea>

            <button type="submit">
                Ask Question
            </button>

        </form>

        {% if response %}

        <div class="response-box">

            <h3>Response:</h3>

            <p>{{ response }}</p>

        </div>

        {% endif %}

    </div>

</body>

</html>
